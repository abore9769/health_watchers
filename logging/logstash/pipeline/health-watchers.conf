# ============================================================
# Logstash Pipeline Configuration for Health Watchers
# ============================================================

input {
  # UDP input for syslog-like logs
  udp {
    port => 5000
    type => "syslog"
  }

  # TCP input for reliable log delivery
  tcp {
    port => 5000
    type => "syslog"
  }

  # HTTP input for direct integration (if needed)
  http {
    port => 8080
    codec => json
  }
}

filter {
  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "[@metadata][index_name]" => "health-watchers-%{+YYYY.MM.dd}" }
    }
  }

  # Parse JSON logs from API and Stellar services
  if [type] == "api" or [type] == "stellar" {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }

    # Extract structured fields from JSON
    if [parsed] {
      mutate {
        copy => {
          "[parsed][timestamp]" => "@timestamp"
          "[parsed][level]" => "log_level"
          "[parsed][message]" => "message"
          "[parsed][service]" => "service"
          "[parsed][request_id]" => "request_id"
          "[parsed][user_id]" => "user_id"
          "[parsed][method]" => "http_method"
          "[parsed][path]" => "http_path"
          "[parsed][status]" => "http_status"
          "[parsed][duration_ms]" => "response_time_ms"
          "[parsed][error]" => "error_message"
        }
      }

      # Remove the parsed object to avoid nested structures
      mutate {
        remove_field => ["parsed"]
      }
    }
  }

  # Parse standard syslog format
  if [type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGLINE}" }
      add_field => { "[@metadata][index_name]" => "health-watchers-syslog-%{+YYYY.MM.dd}" }
    }
  }

  # Add environment tag
  mutate {
    add_field => { "environment" => "${ENVIRONMENT:production}" }
    add_field => { "cluster" => "${CLUSTER:primary}" }
  }

  # Parse error stack traces
  if [message] =~ /^Error:/ or [error_message] {
    grok {
      match => { "message" => "%{DATA:error_type}:%{SPACE}%{DATA:error_desc}%{GREEDYDATA:stack_trace}" }
      keep_on_failure => true
    }
  }

  # Geo-IP enrichment (if needed)
  if [source_ip] {
    geoip {
      source => "source_ip"
      target => "geoip"
    }
  }

  # Remove sensitive data (passwords, tokens)
  mutate {
    gsub => [
      "message", "password[\"']?\s*[:=]\s*[\"']?[^\"'\s]+", "password=***",
      "message", "token[\"']?\s*[:=]\s*[\"']?[^\"'\s]+", "token=***",
      "message", "secret[\"']?\s*[:=]\s*[\"']?[^\"'\s]+", "secret=***",
      "message", "api_key[\"']?\s*[:=]\s*[\"']?[^\"'\s]+", "api_key=***"
    ]
  }

  # Calculate response time bucket for aggregation
  if [response_time_ms] {
    mutate {
      convert => { "response_time_ms" => "integer" }
    }
    if [response_time_ms] < 100 {
      mutate { add_field => { "response_time_bucket" => "fast" } }
    } else if [response_time_ms] < 500 {
      mutate { add_field => { "response_time_bucket" => "medium" } }
    } else if [response_time_ms] < 1000 {
      mutate { add_field => { "response_time_bucket" => "slow" } }
    } else {
      mutate { add_field => { "response_time_bucket" => "very_slow" } }
    }
  }

  # Flag error logs
  if [log_level] =~ /ERROR|CRITICAL|FATAL/ {
    mutate {
      add_field => { "is_error" => true }
    }
  }
}

output {
  # Main Elasticsearch output
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index_name]}"
    user => "${ELASTICSEARCH_USERNAME:elastic}"
    password => "${ELASTIC_PASSWORD:changeme}"
    http_compression => true
    manage_template => false
  }

  # Debug output to console (disable in production)
  if [@metadata][pipeline] == "debug" {
    stdout {
      codec => rubydebug
    }
  }

  # Send critical errors to a separate index for alerting
  if [is_error] == true and [log_level] =~ /CRITICAL|FATAL/ {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "health-watchers-errors-critical-%{+YYYY.MM.dd}"
      user => "${ELASTICSEARCH_USERNAME:elastic}"
      password => "${ELASTIC_PASSWORD:changeme}"
      http_compression => true
    }
  }
}
