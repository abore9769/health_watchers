# SonarCloud configuration for the Health Watchers monorepo
sonar.organization=YOUR_SONARCLOUD_ORG
sonar.host.url=https://sonarcloud.io

# Project key should be set to your SonarCloud project key (usually ORGANIZATION_project)
sonar.projectKey=Health-watchers_health_watchers
sonar.projectName=Health Watchers (monorepo)

# Multi-module configuration
sonar.modules=api,web,stellar-service

[api]
sonar.projectName=Health Watchers: API
sonar.sources=apps/api/src
sonar.tests=apps/api/src
sonar.language=ts
sonar.typescript.lcov.reportPaths=apps/api/coverage/lcov.info

[web]
sonar.projectName=Health Watchers: Web
sonar.sources=apps/web/src
sonar.tests=apps/web/src
sonar.language=ts
sonar.typescript.lcov.reportPaths=apps/web/coverage/lcov.info

[stellar-service]
sonar.projectName=Health Watchers: Stellar Service
sonar.sources=apps/stellar-service/src
sonar.tests=apps/stellar-service/src
sonar.language=ts
sonar.typescript.lcov.reportPaths=apps/stellar-service/coverage/lcov.info

# Default exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.spec.ts
