# ============================================================
# Secrets Manager Rotation Configuration
#
# Enables automatic rotation of secrets stored in AWS Secrets Manager
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: secret-rotation-config
  namespace: health-watchers
  labels:
    app.kubernetes.io/name: health-watchers
    app.kubernetes.io/component: secrets
data:
  rotation_rules.json: |
    {
      "production": {
        "secrets": [
          {
            "name": "health-watchers/production/mongo-password",
            "rotation_days": 30,
            "enabled": true
          },
          {
            "name": "health-watchers/production/jwt-secret",
            "rotation_days": 90,
            "enabled": true
          },
          {
            "name": "health-watchers/production/stellar-keys",
            "rotation_days": 180,
            "enabled": false
          },
          {
            "name": "health-watchers/production/api-keys",
            "rotation_days": 60,
            "enabled": true
          }
        ]
      }
    }

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: secret-rotation-job
  namespace: health-watchers
  labels:
    app.kubernetes.io/name: health-watchers
    app.kubernetes.io/component: secrets
spec:
  # Run rotation check every day at 2 AM
  schedule: '0 2 * * *'
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: health-watchers
            app.kubernetes.io/component: secret-rotator
        spec:
          serviceAccountName: secret-rotator
          restartPolicy: OnFailure
          containers:
            - name: secret-rotator
              image: amazon/aws-cli:latest
              command:
                - /bin/bash
                - -c
                - |
                  #!/bin/bash
                  set -e

                  echo "Starting secret rotation check..."

                  # Get rotation config
                  CONFIG='$(cat /config/rotation_rules.json)'

                  # Rotate each secret if needed
                  echo "$CONFIG" | jq -r '.production.secrets[] | select(.enabled==true) | .name' | while read SECRET_NAME; do
                    echo "Checking rotation status for $SECRET_NAME..."
                    
                    # Rotate the secret
                    aws secretsmanager rotate-secret \
                      --secret-id "$SECRET_NAME" \
                      --rotation-rules AutomaticallyAfterDays=$(echo "$CONFIG" | jq ".production.secrets[] | select(.name==\"$SECRET_NAME\") | .rotation_days") \
                      --region ${AWS_REGION:-us-east-1}
                    
                    echo "Rotation initiated for $SECRET_NAME"
                  done

                  echo "Secret rotation check completed"
              volumeMounts:
                - name: config
                  mountPath: /config
              env:
                - name: AWS_REGION
                  value: us-east-1
              resources:
                requests:
                  memory: '256Mi'
                  cpu: '100m'
                limits:
                  memory: '512Mi'
                  cpu: '500m'
          volumes:
            - name: config
              configMap:
                name: secret-rotation-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-rotator
  namespace: health-watchers
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/health-watchers-secret-rotator

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-rotator
  namespace: health-watchers
rules:
  - apiGroups: ['']
    resources: ['secrets']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['']
    resources: ['events']
    verbs: ['create', 'patch']

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-rotator
  namespace: health-watchers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secret-rotator
subjects:
  - kind: ServiceAccount
    name: secret-rotator
    namespace: health-watchers
