# ============================================================
# Enhanced External Secrets Operator (ESO) Configuration
#
# Securely integrates AWS Secrets Manager with Kubernetes
# with audit logging, access controls, and rotation policies
# ============================================================

---
# ServiceAccount for External Secrets Operator
apiVersion: v1
kind: ServiceAccount
metadata:
  name: health-watchers-sa
  namespace: health-watchers
  labels:
    app.kubernetes.io/name: health-watchers
    app.kubernetes.io/component: secrets
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/health-watchers-secrets-access

---
# ClusterRole for External Secrets Operator
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: health-watchers-secrets-reader
  labels:
    app.kubernetes.io/name: health-watchers
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["secrets/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["external-secrets.io"]
  resources: ["externalsecrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["external-secrets.io"]
  resources: ["externalsecrets/status"]
  verbs: ["get", "update", "patch"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: health-watchers-secrets-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: health-watchers-secrets-reader
subjects:
- kind: ServiceAccount
  name: health-watchers-sa
  namespace: health-watchers

---
# SecretStore pointing to AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: health-watchers-secret-store
  namespace: health-watchers
  labels:
    app.kubernetes.io/name: health-watchers
    app.kubernetes.io/component: secrets
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: health-watchers-sa
      endpoint: https://secretsmanager.us-east-1.amazonaws.com
  refreshInterval: 1h
  retryInterval: 15m

---
# ExternalSecret for Production Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: health-watchers-secrets
  namespace: health-watchers
  labels:
    app.kubernetes.io/name: health-watchers
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: health-watchers
  annotations:
    # Audit logging will capture this resource
    audit.kubernetes.io/log-level: "detail"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: health-watchers-secret-store
    kind: SecretStore
  target:
    name: health-watchers-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: health-watchers
          app.kubernetes.io/component: secrets
      data:
        # Database credentials
        mongodb-uri: "{{ .MONGO_URI }}"
        mongodb-username: "{{ .MONGO_ROOT_USERNAME }}"
        mongodb-password: "{{ .MONGO_ROOT_PASSWORD }}"
        
        # JWT secrets
        jwt-access-token-secret: "{{ .JWT_ACCESS_TOKEN_SECRET }}"
        jwt-refresh-token-secret: "{{ .JWT_REFRESH_TOKEN_SECRET }}"
        
        # Encryption keys
        field-encryption-key: "{{ .FIELD_ENCRYPTION_KEY }}"
        
        # Stellar blockchain
        stellar-secret-key: "{{ .STELLAR_SECRET_KEY }}"
        stellar-public-key: "{{ .STELLAR_PUBLIC_KEY }}"
        stellar-platform-public-key: "{{ .STELLAR_PLATFORM_PUBLIC_KEY }}"
        
        # Third-party API keys
        gemini-api-key: "{{ .GEMINI_API_KEY }}"
        
        # Email/SMTP
        smtp-user: "{{ .SMTP_USER }}"
        smtp-password: "{{ .SMTP_PASSWORD }}"
        
        # Metrics authentication
        metrics-username: "{{ .METRICS_USERNAME }}"
        metrics-password: "{{ .METRICS_PASSWORD }}"
        
  data:
    # Database
    - secretKey: MONGO_URI
      remoteRef:
        key: health-watchers/production
        property: MONGO_URI
    - secretKey: MONGO_ROOT_USERNAME
      remoteRef:
        key: health-watchers/production
        property: MONGO_ROOT_USERNAME
    - secretKey: MONGO_ROOT_PASSWORD
      remoteRef:
        key: health-watchers/production
        property: MONGO_ROOT_PASSWORD
    
    # JWT
    - secretKey: JWT_ACCESS_TOKEN_SECRET
      remoteRef:
        key: health-watchers/production
        property: JWT_ACCESS_TOKEN_SECRET
    - secretKey: JWT_REFRESH_TOKEN_SECRET
      remoteRef:
        key: health-watchers/production
        property: JWT_REFRESH_TOKEN_SECRET
    
    # Encryption
    - secretKey: FIELD_ENCRYPTION_KEY
      remoteRef:
        key: health-watchers/production
        property: FIELD_ENCRYPTION_KEY
    
    # Stellar
    - secretKey: STELLAR_SECRET_KEY
      remoteRef:
        key: health-watchers/production
        property: STELLAR_SECRET_KEY
    - secretKey: STELLAR_PUBLIC_KEY
      remoteRef:
        key: health-watchers/production
        property: STELLAR_PUBLIC_KEY
    - secretKey: STELLAR_PLATFORM_PUBLIC_KEY
      remoteRef:
        key: health-watchers/production
        property: STELLAR_PLATFORM_PUBLIC_KEY
    
    # APIs
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: health-watchers/production
        property: GEMINI_API_KEY
    
    # Email
    - secretKey: SMTP_USER
      remoteRef:
        key: health-watchers/production
        property: SMTP_USER
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: health-watchers/production
        property: SMTP_PASSWORD
    
    # Metrics
    - secretKey: METRICS_USERNAME
      remoteRef:
        key: health-watchers/production
        property: METRICS_USERNAME
    - secretKey: METRICS_PASSWORD
      remoteRef:
        key: health-watchers/production
        property: METRICS_PASSWORD

---
# NetworkPolicy to restrict secret access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: secrets-access-control
  namespace: health-watchers
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: health-watchers
  policyTypes:
  - Ingress
  - Egress
  egress:
  # Allow access to AWS Secrets Manager
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    to:
    - podSelector:
        matchLabels:
          k8s-app: aws-node
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
