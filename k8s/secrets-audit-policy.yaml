# ============================================================
# Secrets Audit Logging Policy
#
# Audits all access to secrets for compliance and security monitoring
# ============================================================

apiVersion: audit.k8s.io/v1
kind: Policy

# Log Pod exec at RequestResponse level
rules:
  # Log all requests at Metadata level
  - level: Metadata
    resources: ["secrets"]
    namespace: ["health-watchers"]
    omitStages:
    - RequestReceived

  # Log detailed audit for secret creation and deletion
  - level: RequestResponse
    resources: ["secrets"]
    namespace: ["health-watchers"]
    verbs: ["create", "delete", "patch", "update"]
    omitStages:
    - RequestReceived

  # Log all access to secrets from external-secrets operator
  - level: RequestResponse
    resources: ["secrets"]
    namespace: ["health-watchers"]
    userGroups: ["system:serviceaccounts:health-watchers"]
    omitStages:
    - RequestReceived

  # Log all secret reads with response body
  - level: RequestResponse
    resources: ["secrets"]
    namespace: ["health-watchers"]
    verbs: ["get", "list"]
    omitStages:
    - RequestReceived

  # Default - log at Metadata level
  - level: Metadata
    omitStages:
    - RequestReceived
