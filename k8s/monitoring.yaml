# ServiceMonitor for API service
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api
  namespace: health-watchers
  labels:
    app.kubernetes.io/name: health-watchers
    app.kubernetes.io/component: api
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: health-watchers
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      interval: 30s
      path: /metrics
      scrapeTimeout: 10s

